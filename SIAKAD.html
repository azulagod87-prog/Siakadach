        // Fungsi menghitung Nilai Akhir, IP, IPK
        function calculateNilaiAkhir(nilai) {
            return (nilai.tugas * 0.20) + (nilai.praktik * 0.25) + (nilai.uts * 0.20) + (nilai.uas * 0.30) + (nilai.absen * 0.05);
        }

        function getGrade(nilai) {
            if (nilai >= 85) return { grade: 'A', bobot: 4.0 };
            if (nilai >= 75) return { grade: 'B', bobot: 3.0 };
            if (nilai >= 65) return { grade: 'C', bobot: 2.0 };
            if (nilai >= 50) return { grade: 'D', bobot: 1.0 };
            return { grade: 'E', bobot: 0.0 };
        }

        function getStatusLulus(nilai) {
            return nilai >= 65 ? 'Lulus' : 'Tidak Lulus';
        }

        function calculateIP(mahasiswaId, semester) {
            const nilaiList = allData.filter(n => n.type === 'nilai' && n.mahasiswaId === mahasiswaId && n.semester === semester);
            if (nilaiList.length === 0) return { ip: 0, totalSks: 0, totalBobot: 0 };
            
            let totalBobot = 0;
            let totalSks = 0;
            
            for (const n of nilaiList) {
                const matkul = getById(n.matkulId);
                if (matkul) {
                    const nilaiAkhir = calculateNilaiAkhir(n);
                    const grade = getGrade(nilaiAkhir);
                    totalBobot += grade.bobot * matkul.sks;
                    totalSks += matkul.sks;
                }
            }
            
            return { ip: totalSks > 0 ? totalBobot / totalSks : 0, totalSks, totalBobot };
        }

        function calculateIPK(mahasiswaId) {
            const nilaiList = allData.filter(n => n.type === 'nilai' && n.mahasiswaId === mahasiswaId);
            if (nilaiList.length === 0) return { ipk: 0, totalSks: 0, totalBobot: 0 };
            
            let totalBobot = 0;
            let totalSks = 0;
            
            for (const n of nilaiList) {
                const matkul = getById(n.matkulId);
                if (matkul) {
                    const nilaiAkhir = calculateNilaiAkhir(n);
                    const grade = getGrade(nilaiAkhir);
                    totalBobot += grade.bobot * matkul.sks;
                    totalSks += matkul.sks;
                }
            }
            
            return { ipk: totalSks > 0 ? totalBobot / totalSks : 0, totalSks, totalBobot };
        }

        function calculateAllIP() {
            const mahasiswaList = getByType('mahasiswa');
            for (const mhs of mahasiswaList) {
                // Hitung IPS per semester
                const semesters = [1, 2, 3, 4];
                let semesterData = [];
                let totalSemesterSks = 0;
                let totalSemesterBobot = 0;
                
                for (const sem of semesters) {
                    const result = calculateIP(mhs.__backendId, sem);
                    if (result.totalSks > 0) {
                        semesterData.push({ semester: sem, ip: result.ip, sks: result.totalSks });
                        totalSemesterSks += result.totalSks;
                        totalSemesterBobot += result.totalBobot;
                    }
                }
                
                // Hitung IPK
                const ipkData = calculateIPK(mhs.__backendId);
                
                // Simpan data IP ke mahasiswa
                mhs.semesterData = semesterData;
                mhs.ipk = ipkData.ipk;
                mhs.totalSks = ipkData.totalSks;
                
                // Tentukan status kelulusan (minimal 144 SKS dan IPK >= 2.0)
                mhs.statusKelulusan = (mhs.totalSks >= 144 && mhs.ipk >= 2.0) ? 'Lulus' : 'Belum Lulus';
            }
        }

        async function createRecord(data) {
            const newRecord = { ...data, __backendId: Date.now() + '-' + Math.random() };
            allData.push(newRecord);
            calculateAllIP();
            localStorage.setItem('siakadData', JSON.stringify(allData));
            return newRecord;
        }

        async function deleteRecord(record) {
            const index = allData.findIndex(d => d.__backendId === record.__backendId);
            if (index !== -1) {
                // Hapus juga nilai terkait jika menghapus mahasiswa
                if (record.type === 'mahasiswa') {
                    const nilaiList = allData.filter(n => n.type === 'nilai' && n.mahasiswaId === record.__backendId);
                    for (const n of nilaiList) {
                        const idx = allData.findIndex(d => d.__backendId === n.__backendId);
                        if (idx !== -1) allData.splice(idx, 1);
                    }
                }
                allData.splice(index, 1);
                calculateAllIP();
                localStorage.setItem('siakadData', JSON.stringify(allData));
            }
        }

        async function updateRecord(record, newData) {
            const index = allData.findIndex(d => d.__backendId === record.__backendId);
            if (index !== -1) {
                allData[index] = { ...allData[index], ...newData };
                calculateAllIP();
                localStorage.setItem('siakadData', JSON.stringify(allData));
            }
        }

                            <td><span class="badge-status ${grade.grade === 'A' ? 'badge-lulus' : 'badge-tidak-lulus'}">${grade.grade}</span></td>
                            <td><span class="badge-status ${status === 'Lulus' ? 'badge-lulus' : 'badge-tidak-lulus'}">${status}</span></td>
                            <td><button class="btn-action btn-delete" onclick="deleteItem('${n.__backendId}')">Hapus</button></td></tr>`;
                        }).join('')}</tbody></table></div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Fungsi simpan nilai
        window.simpanNilai = async function() {
            const mahasiswaId = document.getElementById('pilih-mahasiswa').value;
            const matkulId = document.getElementById('pilih-matkul').value;
            const semester = Number(document.getElementById('pilih-semester').value);
            
            if (!mahasiswaId || !matkulId) {
                showToast('Pilih mahasiswa dan mata kuliah!', true);
                return;
            }
            
            const tugas = Number(document.getElementById('n-tugas').value);
            const praktik = Number(document.getElementById('n-praktik').value);
            const uts = Number(document.getElementById('n-uts').value);
            const uas = Number(document.getElementById('n-uas').value);
            const absen = Number(document.getElementById('n-absen').value);
            
            // Cek apakah nilai sudah ada
            const existing = allData.find(n => n.type === 'nilai' && n.mahasiswaId === mahasiswaId && n.matkulId === matkulId);
            if (existing) {
                if (!confirm('Nilai untuk mahasiswa dan mata kuliah ini sudah ada. Update?')) return;
                await updateRecord(existing, { tugas, praktik, uts, uas, absen, semester });
                showToast('Nilai berhasil diupdate!');
            } else {
                await createRecord({ type: 'nilai', mahasiswaId, matkulId, tugas, praktik, uts, uas, absen, semester });
                showToast('Nilai berhasil disimpan!');
            }
            
            renderPage('nilai');
        };

        // Render Transkrip Nilai
        function renderTranskrip() {
            const mahasiswa = getByType('mahasiswa');
            const content = document.getElementById('content-area');
            
            content.innerHTML = `
                <div class="fade-in">
                    <div class="bg-white rounded-xl border border-indigo-100 p-5 shadow-sm mb-5">
                        <h3 class="font-semibold mb-4 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-indigo-600"></i> Transkrip Nilai Mahasiswa</h3>
                        <select id="pilih-mhs-transkrip" class="w-full md:w-1/2 px-3 py-2 border border-indigo-200 rounded-lg text-sm" onchange="renderTranskripDetail()">
                            <option value="">Pilih Mahasiswa</option>
                            ${mahasiswa.map(m => `<option value="${m.__backendId}">${m.nim} - ${m.name}</option>`).join('')}
                        </select>
                    </div>
                    <div id="transkrip-detail" class="bg-white rounded-xl border border-indigo-100 p-5 shadow-sm">
                        <p class="text-center text-slate-400">Pilih mahasiswa untuk melihat transkrip</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Fungsi render transkrip detail
        window.renderTranskripDetail = function() {
            const mhsId = document.getElementById('pilih-mhs-transkrip').value;
            if (!mhsId) {
                document.getElementById('transkrip-detail').innerHTML = '<p class="text-center text-slate-400">Pilih mahasiswa untuk melihat transkrip</p>';
                return;
            }
            
            const mhs = getById(mhsId);
            if (!mhs) return;
            
            const nilaiList = allData.filter(n => n.type === 'nilai' && n.mahasiswaId === mhsId);
            const matkulList = getByType('matkul');
            
            // Group by semester
            const bySemester = {};
            for (const n of nilaiList) {
                const mk = getById(n.matkulId);
                if (!bySemester[n.semester]) bySemester[n.semester] = [];
                bySemester[n.semester].push({ ...n, matkul: mk });
            }
            
            // Hitung IPS per semester dan IPK total
            const ipkData = calculateIPK(mhsId);
            
            let html = `
                <div class="mb-4">
                    <h4 class="text-lg font-bold text-indigo-600">${mhs.name}</h4>
                    <p class="text-sm text-slate-500">NIM: ${mhs.nim} | Semester: ${mhs.semester} | Angkatan: ${mhs.angkatan}</p>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-3">
                        <div class="bg-gradient-to-r from-green-50 to-green-100 p-3 rounded-lg text-center">
                            <p class="text-sm text-slate-500">IPK</p>
                            <p class="text-2xl font-bold text-green-700">${ipkData.ipk.toFixed(2)}</p>
                        </div>
                        <div class="bg-gradient-to-r from-blue-50 to-blue-100 p-3 rounded-lg text-center">
                            <p class="text-sm text-slate-500">Total SKS</p>
                            <p class="text-2xl font-bold text-blue-700">${ipkData.totalSks}</p>
                        </div>
                        <div class="bg-gradient-to-r from-amber-50 to-amber-100 p-3 rounded-lg text-center">
                            <p class="text-sm text-slate-500">Status</p>
                            <p class="text-lg font-bold ${mhs.statusKelulusan === 'Lulus' ? 'text-green-700' : 'text-amber-700'}">${mhs.statusKelulusan}</p>
                        </div>
                    </div>
                </div>
            `;
            
            // Tampilkan per semester
            const semesters = Object.keys(bySemester).sort();
            for (const sem of semesters) {
                const items = bySemester[sem];
                const ipData = calculateIP(mhsId, Number(sem));
                
                html += `
                    <div class="mt-4 border-t border-indigo-100 pt-4">
                        <div class="flex justify-between items-center mb-2">
                            <h5 class="font-semibold text-slate-700">Semester ${sem}</h5>
                            <span class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-semibold">IPS: ${ipData.ip.toFixed(2)}</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="data-table">
                                <thead><tr><th>Kode</th><th>Mata Kuliah</th><th>SKS</th><th>Nilai</th><th>Grade</th><th>Bobot</th></tr></thead>
                                <tbody>
                                    ${items.map(item => {
                                        const na = calculateNilaiAkhir(item);
                                        const grade = getGrade(na);
                                        return `<tr>
                                            <td>${item.matkul ? item.matkul.kode : '-'}</td>
                                            <td>${item.matkul ? item.matkul.name : '-'}</td>
                                            <td>${item.matkul ? item.matkul.sks : 0}</td>
                                            <td>${na.toFixed(1)}</td>
                                            <td><span class="badge-status ${grade.grade === 'A' ? 'badge-lulus' : 'badge-tidak-lulus'}">${grade.grade}</span></td>
                                            <td>${grade.bobot.toFixed(1)}</td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('transkrip-detail').innerHTML = html;
            lucide.createIcons();
        };

        // Render Laporan Nilai
        function renderLapNilai() {
            const mahasiswa = getByType('mahasiswa');
            const nilaiList = getByType('nilai');
            const content = document.getElementById('content-area');
            
            // Hitung statistik nilai
            const semuaNilai = nilaiList.map(n => calculateNilaiAkhir(n));
            const rataRata = semuaNilai.length > 0 ? semuaNilai.reduce((a,b) => a+b, 0) / semuaNilai.length : 0;
            const tertinggi = semuaNilai.length > 0 ? Math.max(...semuaNilai) : 0;
            const terendah = semuaNilai.length > 0 ? Math.min(...semuaNilai) : 0;
            const lulus = semuaNilai.filter(n => n >= 65).length;
            const tidakLulus = semuaNilai.filter(n => n < 65).length;
            
            // Data untuk chart distribusi nilai
            const ranges = [
                { label: 'A (85-100)', count: 0 },
                { label: 'B (75-84)', count: 0 },
                { label: 'C (65-74)', count: 0 },
                { label: 'D (50-64)', count: 0 },
                { label: 'E (0-49)', count: 0 }
            ];
            for (const n of semuaNilai) {
                if (n >= 85) ranges[0].count++;
                else if (n >= 75) ranges[1].count++;
                else if (n >= 65) ranges[2].count++;
                else if (n >= 50) ranges[3].count++;
                else ranges[4].count++;
            }
            
            content.innerHTML = `
                <div class="fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6">
                        <div class="gradient-card rounded-xl p-5 border border-indigo-100 shadow-sm text-center">
                            <p class="text-sm text-slate-500">Rata-rata Nilai</p>
                            <p class="text-2xl font-bold text-indigo-600">${rataRata.toFixed(1)}</p>
                        </div>
                        <div class="gradient-card rounded-xl p-5 border border-indigo-100 shadow-sm text-center">
                            <p class="text-sm text-slate-500">Nilai Tertinggi</p>
                            <p class="text-2xl font-bold text-green-600">${tertinggi.toFixed(1)}</p>
                        </div>
                        <div class="gradient-card rounded-xl p-5 border border-indigo-100 shadow-sm text-center">
                            <p class="text-sm text-slate-500">Nilai Terendah</p>
                            <p class="text-2xl font-bold text-red-600">${terendah.toFixed(1)}</p>
                        </div>
                        <div class="gradient-card rounded-xl p-5 border border-indigo-100 shadow-sm text-center">
                            <p class="text-sm text-slate-500">Total Data Nilai</p>
                            <p class="text-2xl font-bold text-blue-600">${nilaiList.length}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div class="bg-white rounded-xl border border-indigo-100 p-5 shadow-sm">
                            <h3 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
                                <i data-lucide="pie-chart" class="w-5 h-5 text-indigo-600"></i>
                                Distribusi Nilai
                            </h3>
                            <div class="space-y-3">
                                ${ranges.map(r => {
                                    const percent = nilaiList.length > 0 ? Math.round((r.count / nilaiList.length) * 100) : 0;
                                    const colors = ['green', 'blue', 'yellow', 'orange', 'red'];
                                    const idx = ranges.indexOf(r);
                                    return `<div class="flex items-center gap-3">
                                        <div class="w-24 text-sm">${r.label}</div>
                                        <div class="flex-1">
                                            <div class="bg-${colors[idx]}-100 rounded-full h-2 overflow-hidden">
                                                <div class="bg-${colors[idx]}-500 h-full rounded-full transition-all" style="width:${percent}%"></div>
                                            </div>
                                        </div>
                                        <p class="text-sm font-medium w-12 text-right">${r.count}</p>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-xl border border-indigo-100 p-5 shadow-sm">
                            <h3 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
                                <i data-lucide="graduation-cap" class="w-5 h-5 text-indigo-600"></i>
                                Status Kelulusan Mahasiswa
                            </h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-gradient-to-r from-green-50 to-green-100 rounded-xl p-4 text-center border border-green-200">
                                    <p class="text-3xl font-bold text-green-700">${mahasiswa.filter(m => m.statusKelulusan === 'Lulus').length}</p>
                                    <p class="text-xs text-green-600 mt-1">Lulus</p>
                                </div>
                                <div class="bg-gradient-to-r from-yellow-50 to-yellow-100 rounded-xl p-4 text-center border border-yellow-200">
                                    <p class="text-3xl font-bold text-yellow-700">${mahasiswa.filter(m => m.statusKelulusan === 'Belum Lulus').length}</p>
                                    <p class="text-xs text-yellow-600 mt-1">Belum Lulus</p>
                                </div>
                            </div>
                            <div class="mt-3 text-xs text-slate-400 text-center">
                                <i data-lucide="info" class="w-3 h-3 inline"></i> 
                                Kelulusan: minimal 144 SKS dan IPK ≥ 2.0
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl border border-indigo-100 p-5 shadow-sm">
                        <h3 class="font-semibold mb-3 flex items-center gap-2">
                            <i data-lucide="clipboard-list" class="w-5 h-5 text-indigo-600"></i>
                            Rekap Nilai Mahasiswa
                        </h3>
                        <div class="overflow-x-auto">
                            <table class="data-table">
                                <thead><tr><th>NIM</th><th>Nama</th><th>Jumlah MK</th><th>Rata-rata</th><th>IPK</th><th>SKS</th><th>Status</th></tr></thead>
                                <tbody>
                                    ${mahasiswa.map(m => {
                                        const nList = nilaiList.filter(n => n.mahasiswaId === m.__backendId);
                                        const avg = nList.length > 0 ? nList.reduce((s,n) => s + calculateNilaiAkhir(n), 0) / nList.length : 0;
                                        return `<tr>
                                            <td>${m.nim}</td>
                                            <td class="font-medium">${m.name}</td>
                                            <td>${nList.length}</td>
                                            <td>${avg.toFixed(1)}</td>
                                            <td class="font-semibold text-indigo-600">${m.ipk ? m.ipk.toFixed(2) : '0.00'}</td>
                                            <td>${m.totalSks || 0}</td>
                                            <td><span class="badge-status ${m.statusKelulusan === 'Lulus' ? 'badge-lulus' : 'badge-tidak-lulus'}">${m.statusKelulusan}</span></td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Delete item
        window.deleteItem = async (id) => { 
            const r = allData.find(d => d.__backendId === id); 
            if (r) {
                if (r.type === 'mahasiswa') {
                    if (!confirm('Menghapus mahasiswa akan menghapus semua data nilainya. Lanjutkan?')) return;
                }
                await deleteRecord(r); 
                showToast('Data dihapus!'); 
                renderPage(currentPage); 
            }
        };
        
        // Render Page
        function renderPage(page) { 
            const pages = { 
                dashboard: renderDashboard, 
                mahasiswa: renderMahasiswa, 
                dosen: renderDosen, 
                staf: renderStaf, 
                matkul: renderMatkul, 
                nilai: renderNilai, 
                transkrip: renderTranskrip, 
                'lap-nilai': renderLapNilai
            }; 
            if (pages[page]) pages[page](); 
            else document.getElementById('content-area').innerHTML = '<p class="text-slate-400">Halaman tidak ditemukan.</p>'; 
            lucide.createIcons(); 
        }

        // Init
        initData();
        lucide.createIcons();
    </script>
</body>
</html>
